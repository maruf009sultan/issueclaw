name: IssueClaw Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]

# Prevent overlapping runs on the same issue/PR.
# This is critical for enterprise use: avoids race conditions in state commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only respond to repo owners, members, and collaborators.
    # Random users cannot trigger the agent on public repos.
    if: >
      (
        github.event_name == 'issues' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.comment.user.login != 'github-actions[bot]' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history for git operations
          fetch-depth: 0
          # Use GITHUB_TOKEN for persistent auth
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup GitHub CLI
        # gh is pre-installed on ubuntu-latest, but we ensure auth
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          gh auth status

      - name: Configure git
        run: |
          git config --global user.name "issueclaw[bot]"
          git config --global user.email "issueclaw[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Pre-install (add reaction)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: bun run src/lifecycle/preinstall.ts

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # Gemini (RECOMMENDED — 1M TPM free tier, best for AI agents)
          # Get key: https://aistudio.google.com/app/apikey
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Cerebras (free, ultra-fast, 60K TPM)
          # Get key: https://inference.cerebras.ai/
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          # OpenRouter (has free models, good fallback)
          # Get key: https://openrouter.ai/keys
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Groq (free, 12K TPM — last resort fallback)
          # Get key: https://console.groq.com/keys
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Anthropic (paid)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OpenAI (paid)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Custom OpenAI-compatible endpoint (e.g. local LLM, Azure, Together, vLLM)
          ISSUECLAW_BASE_URL: ${{ secrets.ISSUECLAW_BASE_URL }}
          # Optional overrides
          ISSUECLAW_PROVIDER: ${{ vars.ISSUECLAW_PROVIDER }}
          ISSUECLAW_MODEL: ${{ vars.ISSUECLAW_MODEL }}
          ISSUECLAW_LOG_LEVEL: ${{ vars.ISSUECLAW_LOG_LEVEL || 'info' }}
        run: bun run src/lifecycle/main.ts

      - name: Upload session artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issueclaw-session-${{ github.run_id }}
          path: |
            state/
            /tmp/agent-raw-*.jsonl
          retention-days: 30
          if-no-files-found: ignore
